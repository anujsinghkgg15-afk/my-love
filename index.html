<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Priyuu 💖</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  color: white;
  text-align: center;
  overflow: hidden;
}

.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

h1 {
  max-width: 320px;
  line-height: 1.5;
}

button {
  padding: 12px 24px;
  border-radius: 25px;
  border: none;
  background: white;
  color: #ff4d6d;
  margin-top: 20px;
  cursor: pointer;
}

#noBtn { position: absolute; }

img {
  width: 220px;
  border-radius: 15px;
  margin-top: 15px;
  display: none;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.glow {
  text-shadow: 0 0 10px #fff, 0 0 25px #ff4d6d, 0 0 40px #ff4d6d;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #fff; }
  to { text-shadow: 0 0 40px #ff4d6d; }
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
}

.heart {
  position: absolute;
  font-size: 18px;
  animation: float 5s linear infinite;
}

@keyframes float {
  from {transform: translateY(100vh);}
  to {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8f1b36c.mp3">
</audio>

<div class="container" id="main">
  <h1 id="text"></h1>
  <img id="photo">
  <div>
    <button onclick="next()">tap here 💕</button>
    <button id="noBtn" onmouseover="moveNo()">no 😒</button>
  </div>
</div>

<div class="container" id="final" style="display:none;">
  <h1 class="glow">
    i didn’t plan this…<br><br>
    but you became special 💖<br><br>
    <b>priyuu</b> 🫶<br><br>
    love u.
  </h1>
</div>

<canvas id="fireworks"></canvas>

<script>

let step = 0;

const lines = [
"hey…",
"wait a second 💭",
"don’t skip this… please",
"i really wanted to tell you something",
"but never said it properly",
"so today… i’m trying",
"you know…",
"talking to you feels different",
"not forced… not fake",
"just real… comfortable",
"and slowly…",
"you became my favorite person 💖",
"your smile…",
"yeah… that’s my weakness 🫶",
"and your presence…",
"it just makes everything better",
"so tell me honestly…",
"do you like me? 😊",
"do you miss me sometimes? 💭",
"and… do you love me? 💗"
];

const images = [
"img1.jpg","img2.jpg","img3.jpg","img4.jpg","img5.jpg"
];

function typeText(text, i = 0) {
  if (i < text.length) {
    document.getElementById("text").innerHTML += text.charAt(i);
    setTimeout(() => typeText(text, i+1), 35);
  }
}

function next() {
  document.getElementById("music").play();

  if (step < lines.length) {
    document.getElementById("text").innerHTML = "";
    typeText(lines[step]);

    let img = document.getElementById("photo");
    if(step < images.length){
      img.src = images[step];
      img.style.display = "block";
    }

    step++;
  } else {
    document.getElementById("main").style.display = "none";
    document.getElementById("final").style.display = "flex";
    startFireworks();
  }
}

function moveNo() {
  let btn = document.getElementById("noBtn");
  btn.style.left = Math.random()*window.innerWidth+"px";
  btn.style.top = Math.random()*window.innerHeight+"px";
}

// 🎆 FIREWORKS
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function fire() {
  let x = Math.random()*canvas.width;
  let y = Math.random()*canvas.height/2;

  for(let i=0;i<40;i++){
    particles.push({x,y,dx:(Math.random()-0.5)*6,dy:(Math.random()-0.5)*6,life:100});
  }
}

function update(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach((p,i)=>{
    p.x+=p.dx;
    p.y+=p.dy;
    p.life--;
    ctx.fillStyle="white";
    ctx.fillRect(p.x,p.y,2,2);
    if(p.life<=0) particles.splice(i,1);
  });
  requestAnimationFrame(update);
}

function startFireworks(){
  setInterval(fire,400);
  update();
}

// 💕 floating hearts
setInterval(()=>{
  const heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="💖";
  heart.style.left=Math.random()*100+"vw";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),5000);
},300);

</script>

</body>
</html>
