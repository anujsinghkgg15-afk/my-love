<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Priyuu 💖</title>

<style>
body {
  margin:0;
  text-align:center;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  color:white;
  overflow:hidden;
}

.container {
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

h1 { max-width:340px; }

button {
  padding:12px 20px;
  margin:10px;
  font-size:16px;
  border:none;
  border-radius:20px;
  background:white;
  color:#ff4d6d;
  z-index:1000;
  position:relative;
  cursor:pointer;
}

#noBtn, #yesBtn, #noBtn2 { z-index:1000; }

img {
  width:230px;
  border-radius:15px;
  margin-top:15px;
  display:none;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.glow {
  font-size:24px;
  text-shadow:0 0 10px #fff,0 0 25px #ff4d6d;
}

canvas {
  position:fixed;
  top:0;
  left:0;
  pointer-events:none;
  z-index:0;
}

.heart { position:absolute; font-size:20px; }

#questionButtons {
  margin-top:20px;
  display:flex;
  justify-content:center;
  gap:20px;
}
</style>
</head>

<body>

<div class="container" id="main">
  <h1 id="text">Tap start &#128150;</h1>
  <img id="photo">
  <div>
    <button onclick="next()">Start &#128149;</button>
    <button id="noBtn" onmouseover="moveNo()">No &#128533;</button>
  </div>

  <!-- Yes/No buttons in question session -->
  <div id="questionButtons" style="display:none;">
    <button id="yesBtn" onclick="yesClicked()">Yes &#128150;</button>
    <button id="noBtn2" onclick="noClicked()">No &#128546;</button>
  </div>
</div>

<div class="container" id="final" style="display:none;">
  <h1 class="glow">
    you became really special to me… &#128150;<br><br>
    <b>priyuu</b> &#129339;<br><br>
    love u… always.
  </h1>
</div>

<!-- Music -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8f1b36c.mp3" type="audio/mpeg">
</audio>

<canvas id="fireworks"></canvas>

<script>
// ==================== VARIABLES ====================
let step = 0;

let lines = [
"hey… &#128524;",
"wait a second &#128524;",
"don’t skip this… please &#129303;",
"i really wanted to tell you something &#129315;",
"but never said it properly &#128533;",
"so today… i’m trying &#128150;",
"you know… &#129300;",
"talking to you feels different &#128522;",
"not forced… not fake… just real &#128151;",
"it feels calm… comfortable… peaceful &#129499;&#127997;",
"and slowly… &#127793;",
"you became someone important to me &#128150;",
"i don’t even know when it happened &#128523;",
"but it did… &#129392;",
"your smile… &#128525;",
"yeah… that’s my favorite thing &#129339;",
"and your voice… &#127926;",
"it stays in my mind sometimes &#128524;",
"and your presence… &#10024;",
"it makes everything better &#128150;",
"so tell me honestly… &#129300;",
"do you enjoy talking to me? &#128522;",
"do you ever wait for my message? &#128140;",
"do i come to your mind randomly? &#129315;",
"do you smile when you see my name? &#129339;",
"do you miss me… even a little? &#128546;",
"do you feel comfortable with me? &#129303;",
"do you trust me? &#128150;",
"do you feel something… even a little? &#128151;",
"because honestly… &#129339;",
"i do… &#128525;",
"a lot more than i expected &#128150;",
"so tell me one last thing…",
"do you feel the same? &#128151;"
];

// ==================== LOCAL IMAGES ====================
let images = [
"images/img1.jpg",
"images/img2.jpg",
"images/img3.jpg",
"images/img4.jpg",
"images/img5.jpg"
];

// ==================== TYPING EFFECT ====================
function typeText(text,i=0){
  let el=document.getElementById("text");
  if(i===0) el.innerHTML="";
  if(i<text.length){
    el.innerHTML+=text.charAt(i);
    setTimeout(()=>typeText(text,i+1),35);
  }
}

// ==================== MAIN FLOW ====================
function next(){
  document.getElementById("music").play().catch(()=>{});
  if(step<lines.length){
    typeText(lines[step]);

    // Show image if available
    let img=document.getElementById("photo");
    if(step<images.length){
      img.src=images[step];
      img.style.display="block";
    }

    // Show Yes/No buttons on last few questions
    if(step>=27) document.getElementById("questionButtons").style.display="flex";

    step++;
  } else {
    document.getElementById("main").style.display="none";
    document.getElementById("final").style.display="flex";
    startFireworks();
    startHearts();
  }
}

// ==================== NO BUTTON ====================
function moveNo(){
  let btn=document.getElementById("noBtn");
  btn.style.left=Math.random()*(window.innerWidth-btn.offsetWidth)+"px";
  btn.style.top=Math.random()*(window.innerHeight-btn.offsetHeight)+"px";
}

// ==================== YES / NO BUTTONS ====================
function yesClicked(){
  alert("Yay! &#128150; I'm so happy!");
}
function noClicked(){
  alert("Oh no… &#128546; I hope you change your mind!");
}

// ==================== FIREWORKS ====================
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let particles=[];
function fire(){
  let x=Math.random()*canvas.width;
  let y=Math.random()*canvas.height/2;
  for(let i=0;i<40;i++){
    particles.push({x,y,dx:(Math.random()-0.5)*6,dy:(Math.random()-0.5)*6,life:100});
  }
}
function update(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach((p,i)=>{
    p.x+=p.dx; p.y+=p.dy; p.life--;
    ctx.fillStyle="white";
    ctx.fillRect(p.x,p.y,2,2);
    if(p.life<=0) particles.splice(i,1);
  });
  requestAnimationFrame(update);
}
function startFireworks(){ setInterval(fire,400); update(); }

// ==================== HEARTS ====================
function startHearts(){
  setInterval(()=>{
    let heart=document.createElement("div");
    heart.innerHTML="&#128150;";
    heart.className="heart";
    heart.style.left=Math.random()*100+"vw";
    heart.style.top="100vh";
    document.body.appendChild(heart);
    let move=setInterval(()=>{
      heart.style.top=(heart.offsetTop-2)+"px";
      if(heart.offsetTop<0){ heart.remove(); clearInterval(move); }
    },20);
  },300);
}
</script>

</body>
</html>
