<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Priyuu 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  color: white;
  text-align: center;
  overflow: hidden;
}

.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

h1 {
  max-width: 320px;
}

button {
  padding: 12px 24px;
  border-radius: 25px;
  border: none;
  background: white;
  color: #ff4d6d;
  margin: 10px;
  font-size: 16px;
}

#noBtn {
  position: absolute;
}

img {
  width: 220px;
  border-radius: 15px;
  margin-top: 15px;
  display: none;
}

.glow {
  font-size: 24px;
  text-shadow: 0 0 10px #fff, 0 0 20px #ff4d6d;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
}
</style>
</head>

<body>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8f1b36c.mp3">
</audio>

<div class="container" id="main">
  <h1 id="text">tap once… I made something for you 💖</h1>
  <img id="photo">
  <div>
    <button onclick="next()">Start 💕</button>
    <button id="noBtn" onmouseover="moveNo()">No 😒</button>
  </div>
</div>

<div class="container" id="final" style="display:none;">
  <h1 class="glow">
    you became special to me… 💖<br><br>
    <b>priyuu</b> 🫶<br><br>
    love u.
  </h1>
</div>

<canvas id="fireworks"></canvas>

<script>

let step = 0;

const lines = [
"hey…",
"wait a second 💭",
"don’t skip this… please",
"i wanted to tell you something",
"but never said it properly",
"so today… i’m trying",
"talking to you feels different",
"real… calm… comfortable",
"and slowly…",
"you became my favorite person 💖",
"your smile…",
"yeah… that’s my weakness 🫶",
"so tell me…",
"do you like me? 😊",
"do you miss me? 💭",
"do you love me? 💗"
];

const images = [
"img1.jpg","img2.jpg","img3.jpg","img4.jpg","img5.jpg"
];

function next() {
  // start music on first click
  document.getElementById("music").play().catch(()=>{});

  if (step < lines.length) {
    document.getElementById("text").innerText = lines[step];

    let img = document.getElementById("photo");
    if(step < images.length){
      img.src = images[step];
      img.style.display = "block";
    }

    step++;
  } else {
    document.getElementById("main").style.display = "none";
    document.getElementById("final").style.display = "flex";
    startFireworks();
    startHearts();
  }
}

function moveNo() {
  let btn = document.getElementById("noBtn");
  btn.style.left = Math.random()*window.innerWidth+"px";
  btn.style.top = Math.random()*window.innerHeight+"px";
}

// 🎆 FIREWORKS
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function fire() {
  let x = Math.random()*canvas.width;
  let y = Math.random()*canvas.height/2;

  for(let i=0;i<40;i++){
    particles.push({x,y,dx:(Math.random()-0.5)*6,dy:(Math.random()-0.5)*6,life:100});
  }
}

function update(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach((p,i)=>{
    p.x+=p.dx;
    p.y+=p.dy;
    p.life--;
    ctx.fillStyle="white";
    ctx.fillRect(p.x,p.y,2,2);
    if(p.life<=0) particles.splice(i,1);
  });
  requestAnimationFrame(update);
}

function startFireworks(){
  setInterval(fire,400);
  update();
}

// 💕 HEARTS
function startHearts(){
  setInterval(()=>{
    let heart=document.createElement("div");
    heart.innerHTML="💖";
    heart.style.position="absolute";
    heart.style.left=Math.random()*100+"vw";
    heart.style.top="100vh";
    heart.style.fontSize="20px";
    document.body.appendChild(heart);

    let move=setInterval(()=>{
      heart.style.top=(heart.offsetTop-2)+"px";
      if(heart.offsetTop<0){
        heart.remove();
        clearInterval(move);
      }
    },20);

  },300);
}

</script>

</body>
</html>
