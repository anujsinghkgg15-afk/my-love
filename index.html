<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Priyuu 💖</title>

<style>
body {
  text-align:center;
  background:pink;
  font-family:sans-serif;
}

button {
  padding:10px 20px;
  margin:10px;
  font-size:18px;
}

#noBtn {
  position:absolute;
}
</style>
</head>

<body>

<h1 id="text">Tap start 💖</h1>

<button onclick="start()">Start 💕</button>
<button id="noBtn" onmouseover="moveNo()">No 😒</button>

<audio id="music">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8f1b36c.mp3">
</audio>

<script>

let step = 0;

let lines = [
"hey…",
"i wanted to tell you something 💭",
"you became special 💖",
"priyuu… love u 💗"
];

function start(){
  document.getElementById("music").play().catch(()=>{});
  
  if(step < lines.length){
    document.getElementById("text").innerText = lines[step];
    step++;
  }
}

function moveNo(){
  let btn = document.getElementById("noBtn");
  btn.style.left = Math.random()*300+"px";
  btn.style.top = Math.random()*300+"px";
}

</script>

</body>
</html>
