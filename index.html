<!DOCTYPE html>
<!-- updated -->
<html>
<head>
<meta charset="UTF-8">
<title>For Priyuu 💖</title>

<style>
body {
  margin:0;
  text-align:center;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  color:white;
  overflow:hidden;
}

.container {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

h1 {
  max-width:340px;
}

button {
  padding:12px 20px;
  margin:10px;
  font-size:16px;
  border:none;
  border-radius:20px;
  background:white;
  color:#ff4d6d;
}

#noBtn {
  position:absolute;
}

img {
  width:230px;
  border-radius:15px;
  margin-top:15px;
  display:none;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.glow {
  font-size:24px;
  text-shadow:0 0 10px #fff,0 0 25px #ff4d6d;
}

canvas {
  position:fixed;
  top:0;
  left:0;
}

.heart {
  position:absolute;
  font-size:20px;
}
</style>
</head>

<body>

<div class="container" id="main">
  <h1 id="text">Tap start 💖</h1>
  <img id="photo">

  <div>
    <button onclick="next()">Start 💕</button>
    <button id="noBtn" onmouseover="moveNo()">No 😒</button>
  </div>
</div>

<div class="container" id="final" style="display:none;">
  <h1 class="glow">
    you became really special to me… 💖<br><br>
    <b>priyuu</b> 🫶<br><br>
    love u… always.
  </h1>
</div>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8f1b36c.mp3">
</audio>

<canvas id="fireworks"></canvas>

<script>

let step = 0;

let lines = [
"hey…",
"wait a second 💭",
"don’t skip this… please",
"i really wanted to tell you something",
"but never said it properly",
"so today… i’m trying",
"you know…",
"talking to you feels different",
"not forced… not fake… just real",
"it feels calm… comfortable… peaceful",
"and slowly…",
"you became someone important to me 💖",
"i don’t even know when it happened",
"but it did…",
"your smile…",
"yeah… that’s my favorite thing 🫶",
"and your voice…",
"it stays in my mind sometimes",
"and your presence…",
"it makes everything better",
"so tell me honestly…",
"do you enjoy talking to me? 😊",
"do you ever wait for my message? 💭",
"do i come to your mind randomly?",
"do you smile when you see my name? 🫶",
"do you miss me… even a little?",
"do you feel comfortable with me?",
"do you trust me?",
"do you feel something… even a little?",
"because honestly…",
"i do…",
"a lot more than i expected 💖",
"so tell me one last thing…",
"do you feel the same? 💗"
];

let images = [
"img1.jpg",
"img2.jpg",
"img3.jpg",
"img4.jpg",
"img5.jpg"
];

// ✨ typing effect
function typeText(text, i = 0) {
  let el = document.getElementById("text");
  if (i === 0) el.innerHTML = "";

  if (i < text.length) {
    el.innerHTML += text.charAt(i);
    setTimeout(() => typeText(text, i + 1), 35);
  }
}

// main flow
function next(){
  document.getElementById("music").play().catch(()=>{});

  if(step < lines.length){
    typeText(lines[step]);

    let img = document.getElementById("photo");
    if(step < images.length){
      img.src = images[step];
      img.style.display = "block";
    }

    step++;
  } else {
    document.getElementById("main").style.display="none";
    document.getElementById("final").style.display="flex";
    startFireworks();
    startHearts();
  }
}

// no button
function moveNo(){
  let btn = document.getElementById("noBtn");
  btn.style.left = Math.random()*window.innerWidth+"px";
  btn.style.top = Math.random()*window.innerHeight+"px";
}

// fireworks
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function fire(){
  let x = Math.random()*canvas.width;
  let y = Math.random()*canvas.height/2;

  for(let i=0;i<40;i++){
    particles.push({x,y,dx:(Math.random()-0.5)*6,dy:(Math.random()-0.5)*6,life:100});
  }
}

function update(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach((p,i)=>{
    p.x+=p.dx;
    p.y+=p.dy;
    p.life--;
    ctx.fillStyle="white";
    ctx.fillRect(p.x,p.y,2,2);
    if(p.life<=0) particles.splice(i,1);
  });
  requestAnimationFrame(update);
}

function startFireworks(){
  setInterval(fire,400);
  update();
}

// hearts
function startHearts(){
  setInterval(()=>{
    let heart=document.createElement("div");
    heart.innerHTML="💖";
    heart.className="heart";
    heart.style.left=Math.random()*100+"vw";
    heart.style.top="100vh";
    document.body.appendChild(heart);

    let move=setInterval(()=>{
      heart.style.top=(heart.offsetTop-2)+"px";
      if(heart.offsetTop<0){
        heart.remove();
        clearInterval(move);
      }
    },20);

  },300);
}

</script>

</body>
</html>
