<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  color: white;
  text-align: center;
  overflow: hidden;
}

.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

h1 {
  font-size: 1.9rem;
  max-width: 340px;
  line-height: 1.5;
}

button {
  margin: 10px;
  padding: 12px 24px;
  border: none;
  border-radius: 25px;
  background: white;
  color: #ff4d6d;
  font-size: 1rem;
  cursor: pointer;
}

#noBtn {
  position: absolute;
}

img {
  width: 220px;
  height: 280px;
  border-radius: 15px;
  margin-top: 15px;
  display: none;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.note {
  margin-top: 12px;
  font-size: 1.2rem;
  max-width: 300px;
  opacity: 0;
  transition: 1s;
}

.note.show {
  opacity: 1;
}

.final {
  display: none;
  font-size: 1.7rem;
}

.glow {
  text-shadow: 0 0 10px #fff, 0 0 20px #ff4d6d;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #fff; }
  to { text-shadow: 0 0 25px #ff4d6d; }
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
}

</style>
</head>

<body>

<div class="container" id="main">
  <h1 id="text">hey… wait a second 💭</h1>
  <img id="photo">
  <div class="note" id="note"></div>

  <div>
    <button onclick="next()">okay 💕</button>
    <button id="noBtn" onmouseover="moveNo()">no 😒</button>
  </div>
</div>

<div class="container final" id="final">
  <div class="glow">
    i don’t know how it happened…<br><br>
    but you slowly became someone really important 💖<br><br>
    and yeah… <b>priyuu</b> 💗<br><br>
    love u.
  </div>
</div>

<canvas id="fireworks"></canvas>

<audio autoplay loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8f1b36c.mp3">
</audio>

<script>

let step = 0;

const texts = [
"hey… wait a second 💭",
"i wanted to tell you something for a while now…",
"but idk why… i never said it properly",
"maybe today feels right",
"so just stay for a moment… okay? 💖",
"you know…",
"talking to you feels different",
"it’s not like others",
"it’s calm… real… comfortable",
"and slowly… you became my favorite person",
"your smile…",
"it does something to me i can’t explain",
"and your presence…",
"it just makes everything better",
"so tell me honestly…",
"do you like talking to me? 😊",
"do i make you smile? 😌",
"am i a little special to you? 💭",
"do you miss me sometimes? 🫶",
"and one last thing…",
"do you… love me? 💗"
];

const notes = [
"", "", "", "", "",
"", "", "", "", "you really matter to me 💖",
"", "that smile… yeah 🫶", "",
"", "",
"", "", "", "", "",
"", ""
];

const images = [
"img1.jpg","img1.jpg","img1.jpg","img2.jpg","img2.jpg",
"img3.jpg","img3.jpg","img3.jpg","img4.jpg","img4.jpg",
"img5.jpg","img5.jpg","img5.jpg","img5.jpg","img5.jpg",
"img5.jpg","img5.jpg","img5.jpg","img5.jpg","img5.jpg",
"img5.jpg","img5.jpg"
];

function next() {
  step++;

  if (step < texts.length) {
    document.getElementById("text").innerText = texts[step];

    let img = document.getElementById("photo");
    let note = document.getElementById("note");

    if(images[step]){
      img.src = images[step];
      img.style.display = "block";
    }

    if(notes[step]){
      note.innerText = notes[step];
      note.classList.add("show");
    }

  } else {
    document.getElementById("main").style.display = "none";
    document.getElementById("final").style.display = "flex";
    startFireworks();
  }
}

function moveNo() {
  let btn = document.getElementById("noBtn");
  btn.style.left = Math.random() * window.innerWidth + "px";
  btn.style.top = Math.random() * window.innerHeight + "px";
}

// fireworks
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function fire() {
  let x = Math.random()*canvas.width;
  let y = Math.random()*canvas.height/2;

  for(let i=0;i<30;i++){
    particles.push({x,y,dx:(Math.random()-0.5)*5,dy:(Math.random()-0.5)*5,life:100});
  }
}

function update(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach((p,i)=>{
    p.x+=p.dx;
    p.y+=p.dy;
    p.life--;
    ctx.fillRect(p.x,p.y,2,2);
    if(p.life<=0) particles.splice(i,1);
  });
  requestAnimationFrame(update);
}

function startFireworks(){
  setInterval(fire,500);
  update();
}

</script>

</body>
